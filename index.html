<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Phalanx — Mission Control</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-mono/style.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
  <link rel="stylesheet" href="/src/styles/base.css">
  <link rel="stylesheet" href="/src/styles/layout.css">
  <link rel="stylesheet" href="/src/styles/components.css">
  <link rel="stylesheet" href="/src/styles/map.css">
  <link rel="stylesheet" href="/src/styles/mobile.css">
  <link rel="stylesheet" href="/src/styles/animations.css">
  <script>
    // Instant session restore — hide gate before first paint, no flash
    if (localStorage.getItem('phalanx-auth') === 'true') {
      document.documentElement.dataset.authed = '';
    }
  </script>
  <style>
    [data-authed] #password-gate { display: none; }
    [data-authed] .shell.hidden { display: flex; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Password gate -->
    <div id="password-gate" class="gate">
      <div class="gate-card">
        <img src="/Phalanx_logo_both_white_new.svg" alt="Phalanx" class="gate-logo-img">
        <div class="gate-sub">USAvionix DFR Demo</div>
        <div class="gate-version">v4.1.0</div>
        <form id="gate-form">
          <input type="password" id="gate-input" placeholder="Access code" autocomplete="off" autofocus>
          <button type="submit" class="btn-primary">Enter</button>
        </form>
        <div id="gate-error" class="gate-error"></div>
      </div>
    </div>

    <!-- Main app shell (hidden until authenticated) -->
    <div id="app-shell" class="shell hidden">
      <!-- Topbar -->
      <header id="topbar" class="topbar">
        <div class="topbar-left">
          <button id="topbar-menu" class="topbar-menu-btn">
            <span class="material-symbols-outlined">menu</span>
          </button>
          <div class="topbar-logo-lockup" id="topbar-logo" style="cursor:pointer">
            <img src="/Phalanx_logo_word_only.svg" alt="Phalanx" class="topbar-logo-wordmark">
            <span class="topbar-logo-badge">DFR</span>
          </div>
          <span class="topbar-divider"></span>
          <nav id="topbar-breadcrumb" class="topbar-breadcrumb"></nav>
        </div>
        <div class="topbar-center">
          <div id="topbar-pills" class="topbar-pills"></div>
        </div>
        <div class="topbar-right">
          <div id="topbar-view-toggle" class="topbar-view-toggle hidden"></div>
        </div>
      </header>

      <!-- Screen container -->
      <main id="screen-container" class="screen-container">
        <!-- Map layer (persistent, behind screens) -->
        <div id="map-container" class="map-container hidden">
          <div id="map" class="map"></div>
        </div>

        <!-- Screen content renders here -->
        <div id="screen-content" class="screen-content"></div>

        <!-- Chat panel (desktop) / Drawer (mobile) -->
        <div id="chat-panel" class="chat-panel hidden">
          <div id="chat-history" class="chat-history"></div>
          <div id="chat-input" class="chat-input-area hidden">
            <button id="btn-mic" class="btn-mic" title="Push to talk">
              <span class="material-symbols-outlined">mic</span>
            </button>
            <textarea id="chat-textarea" rows="1" placeholder="Type a message..."></textarea>
            <button id="btn-send" class="btn-send" title="Send">
              <span class="material-symbols-outlined">send</span>
            </button>
          </div>
        </div>

        <!-- Mobile controls -->
        <div id="mobile-controls" class="mobile-controls hidden">
          <div class="mobile-controls-left">
            <button id="btn-keyboard" class="btn-mobile-icon hidden">
              <span class="material-symbols-outlined">keyboard</span>
            </button>
            <button id="btn-options" class="btn-mobile-icon hidden">
              <span class="material-symbols-outlined">more_horiz</span>
            </button>
          </div>
          <button id="fab" class="fab hidden">
            <span class="material-symbols-outlined">mic</span>
          </button>
        </div>

        <!-- SARA toast (mobile, when drawer closed) -->
        <div id="sara-toast" class="sara-toast hidden"></div>
      </main>
    </div>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
